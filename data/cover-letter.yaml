pt:
  paragraphs:
    - "Com o interesse em contribuir com a equipe de desenvolvimento da sua empresa, apresento minha candidatura para a posição em análise. Sou **Desenvolvedor Full Stack** com **mais de 4 anos de experiência** no desenvolvimento de aplicações web robustas e escaláveis, atuando em projetos de ponta a ponta em empresas de diversos segmentos."
    - "Ao longo da minha trajetória profissional, desenvolvi expertise em frameworks modernos de front-end, como **React, Vue e Angular**, além de atuar com **Node.js, Python e .NET** no desenvolvimento de back-end. Essa vivência full stack me permite compreender o ciclo completo de um projeto, desde a definição de arquitetura até a implementação e manutenção de soluções em produção."
    - "Além das competências técnicas, possuo experiência com **pipelines de CI/CD**, **testes unitários**, **otimização de performance** e **mentoria de equipes**. Já atuei na refatoração de aplicações legadas, na implementação de práticas de qualidade de código e na colaboração com times multidisciplinares, sempre com foco em entregar valor real ao cliente."
    - "Estou em busca de novas oportunidades onde possa aplicar minha experiência e continuar evoluindo profissionalmente. Acredito que minha formação em **Engenharia de Software** pelo **Instituto Federal do Amazonas**, combinada com minha vivência em empresas de tecnologia, me capacita a contribuir de forma significativa com os desafios da sua equipe. Fico à disposição para uma entrevista, onde poderei detalhar minhas experiências e como posso agregar à sua organização."

en:
  paragraphs:
    - "With a strong interest in contributing to your development team, I am writing to express my candidacy for the position under consideration. I am a **Full Stack Developer** with **over 4 years of experience** building robust and scalable web applications, working end-to-end on projects across diverse industries."
    - "Throughout my professional career, I have developed expertise in modern front-end frameworks such as **React, Vue, and Angular**, while also working with **Node.js, Python, and .NET** for back-end development. This full-stack experience allows me to understand the complete lifecycle of a project, from architecture design to implementation and production maintenance."
    - "Beyond technical competencies, I have hands-on experience with **CI/CD pipelines**, **unit testing**, **performance optimization**, and **team mentoring**. I have led legacy application refactoring, implemented code quality practices, and collaborated with cross-functional teams, always focused on delivering real value to the client."
    - "I am actively seeking new opportunities where I can apply my experience and continue to grow professionally. I believe that my degree in **Software Engineering** from the **Federal Institute of Amazonas**, combined with my experience in technology companies, enables me to make a meaningful contribution to the challenges your team faces. I am available for an interview, where I can elaborate on my experiences and how I can add value to your organization."
