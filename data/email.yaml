subject:
  en: "APPLICATION FOR [JOB TITLE]"
  pt: "CANDIDATURA À VAGA DE [NOME DA VAGA]"

body:
  en:
    - "Dear [Hiring Manager's Name] or Hiring Team,"
    - "I am writing to express my interest in the [Job Title] position. With over 4 years of experience building robust and scalable web applications using React, Vue, Angular, Node.js, Python, and .NET, I believe my technical background aligns well with the requirements of this role."
    - "I am available for an interview to discuss how I can contribute to your team. My resume is attached for your review."
  pt:
    - "Prezado(a) [Nome do Recrutador] ou Equipe de Recrutamento,"
    - "Escrevo para expressar meu interesse na vaga de [Nome da Vaga]. Com mais de 4 anos de experiência no desenvolvimento de aplicações web utilizando React, Vue, Angular, Node.js, Python e .NET, acredito que meu perfil técnico está alinhado com os requisitos da posição."
    - "Estou à disposição para uma entrevista onde posso detalhar minha experiência e como posso contribuir para sua equipe. Meu currículo está anexo para análise."
