      - Desenvolvedor Full Stack com **mais de 4 anos de experiência** no desenvolvimento de aplicações web robustas usando **React, Vue e Angular**. Com conhecimento em **Node.js, Python e .NET**. Atuação em **projetos end-to-end**, incluindo levantamento de requisitos, testes de desempenho, CI/CD, provas de conceito e otimização de UX/UI. Entrega de soluções de alto impacto com foco em **performance e valor para o cliente**.
