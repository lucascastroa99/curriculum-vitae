        position: Desenvolvedor Front-end Pleno
        start_date: 2024-07
        end_date: 2025-08
        location: Toledo, PR (Remoto)
        highlights:
          - Levantei requisitos técnicos junto ao cliente e documentei impactos no sistema.
          - Implementei interfaces em **React.js** seguindo diretrizes de usabilidade.
          - Otimizei polígonos e camadas no **MapBox**, reduzindo tempo de carregamento em **80%** e uso de memória de **6GB para 2GB**.
          - Refatorei a arquitetura da aplicação, corrigindo problemas de desempenho e usabilidade.
      - company: "*Ibrowse Consultoria e Informática*"
        position: Analista de Desenvolvimento Pleno
        start_date: 2023-08
        end_date: 2024-01
        location: Porto Alegre, RS (Remoto)
        highlights:
          - Desenvolvi e corrigi funcionalidades em aplicações **Angular**.
          - Defini arquitetura e padrões de design para aplicação e novos módulos.
          - Configurei pipelines de **CI/CD** e administrei repositórios no **GitLab**.
          - Criei testes unitários usando Karma com **77%** de cobertura global.
